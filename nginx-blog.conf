server {
    listen 80;
    listen [::]:80;
    server_name kevintse.icu www.kevintse.icu;
    root /var/www/blog;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
